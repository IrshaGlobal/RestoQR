<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Connection Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .status {
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
            font-weight: 500;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px 10px 0;
        }
        button:hover {
            background: #0056b3;
        }
        .step {
            margin: 20px 0;
            padding: 15px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
        }
        code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔍 Supabase Connection Test</h1>
        <p>Testing your Supabase configuration...</p>
        
        <div id="results"></div>
        
        <button onclick="testConnection()">Test Connection</button>
        <button onclick="checkTables()">Check Tables</button>
        <button onclick="createDemoData()">Create Demo Restaurant</button>
    </div>

    <script>
        const supabaseUrl = 'https://ftuihzoapphxmakufpxf.supabase.co'
        const supabaseKey = 'sb_secret_FiSn3D9FvmJXDjBoA98MJw_wj3lHz4e'
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

        function showResult(message, type = 'info') {
            const resultsDiv = document.getElementById('results')
            const div = document.createElement('div')
            div.className = `status ${type}`
            div.innerHTML = message
            resultsDiv.appendChild(div)
        }

        async function testConnection() {
            document.getElementById('results').innerHTML = ''
            showResult('⏳ Testing connection...', 'info')
            
            try {
                const { data, error } = await supabase
                    .from('restaurants')
                    .select('*')
                    .limit(1)
                
                if (error) {
                    showResult(`❌ Connection failed: ${error.message}`, 'error')
                    showResult(`
                        <strong>Database schema not set up!</strong><br><br>
                        <strong>Next steps:</strong><br>
                        1. Go to <a href="https://app.supabase.com" target="_blank">Supabase Dashboard</a><br>
                        2. Open SQL Editor<br>
                        3. Run the contents of <code>supabase-setup.sql</code> from your project
                    `, 'error')
                    return
                }
                
                showResult('✅ Successfully connected to Supabase!', 'success')
                showResult(`Found ${data?.length || 0} restaurant(s)`, 'success')
                
                if (data && data.length > 0) {
                    showResult(`
                        <strong>Restaurants found:</strong><br>
                        ${data.map(r => `• ${r.name}`).join('<br>')}
                    `, 'success')
                } else {
                    showResult('⚠️ No restaurants found. Click "Create Demo Restaurant" to add one.', 'info')
                }
            } catch (err) {
                showResult(`❌ Error: ${err.message}`, 'error')
            }
        }

        async function checkTables() {
            document.getElementById('results').innerHTML = ''
            showResult('⏳ Checking database tables...', 'info')
            
            const tables = [
                'restaurants', 'tables', 'categories', 'menu_items',
                'orders', 'order_items', 'help_requests', 'restaurant_staff'
            ]
            
            for (const table of tables) {
                try {
                    const { error } = await supabase.from(table).select('*').limit(1)
                    if (error) {
                        showResult(`❌ Table '${table}': ${error.message}`, 'error')
                    } else {
                        showResult(`✅ Table '${table}' exists`, 'success')
                    }
                } catch (err) {
                    showResult(`❌ Table '${table}': ${err.message}`, 'error')
                }
            }
        }

        async function createDemoData() {
            document.getElementById('results').innerHTML = ''
            showResult('⏳ Creating demo restaurant...', 'info')
            
            try {
                const { data, error } = await supabase
                    .from('restaurants')
                    .insert({
                        name: 'Demo Restaurant',
                        currency: '$',
                        is_open: true
                    })
                    .select()
                    .single()
                
                if (error) {
                    showResult(`❌ Failed: ${error.message}`, 'error')
                    return
                }
                
                showResult(`✅ Restaurant created successfully!`, 'success')
                showResult(`
                    <strong>Restaurant ID:</strong> <code>${data.id}</code><br><br>
                    Save this ID - you'll need it to create staff accounts and access the menu!
                `, 'success')
                
                // Create some demo categories
                showResult('⏳ Creating demo categories...', 'info')
                const categories = [
                    { restaurant_id: data.id, name: 'Appetizers', sort_order: 1 },
                    { restaurant_id: data.id, name: 'Main Courses', sort_order: 2 },
                    { restaurant_id: data.id, name: 'Desserts', sort_order: 3 },
                    { restaurant_id: data.id, name: 'Beverages', sort_order: 4 }
                ]
                
                const { error: catError } = await supabase
                    .from('categories')
                    .insert(categories)
                
                if (!catError) {
                    showResult('✅ Demo categories created', 'success')
                }
                
                showResult(`
                    <strong>Next steps:</strong><br>
                    1. Create a user in Supabase Auth dashboard<br>
                    2. Link user to restaurant with this SQL:<br>
                    <pre>INSERT INTO restaurant_staff (user_id, restaurant_id, role)
VALUES ('YOUR_USER_ID', '${data.id}', 'admin');</pre>
                    3. Login at /login and start managing your restaurant!
                `, 'info')
                
            } catch (err) {
                showResult(`❌ Error: ${err.message}`, 'error')
            }
        }

        // Auto-test on load
        window.onload = () => {
            testConnection()
        }
    </script>
</body>
</html>
